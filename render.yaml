services:
  - type: web
    name: marble-park-api
    runtime: node
    plan: free
    region: singapore
    repo: https://github.com/dev2495/marble-park-final
    branch: main
    buildCommand: npm ci && npm run db:generate && npm run build:api
    startCommand: npm run db:migrate:deploy --workspace=apps/api && npm run start --workspace=apps/api
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: marble-park-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://marble-park-web.onrender.com
      - key: CATALOGUE_IMPORT_IMAGE_DIR
        value: /opt/render/project/src/apps/api/public/catalogue-images/imports
      - key: PUBLIC_CATALOGUE_IMAGE_BASE_URL
        value: https://marble-park-api.onrender.com

  - type: web
    name: marble-park-web
    runtime: node
    plan: free
    region: singapore
    repo: https://github.com/dev2495/marble-park-final
    branch: main
    buildCommand: npm ci && NEXT_PUBLIC_API_URL=https://marble-park-api.onrender.com/graphql npm run build --workspace=apps/web
    startCommand: npm run start --workspace=apps/web -- -p $PORT
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        value: https://marble-park-api.onrender.com/graphql

databases:
  - name: marble-park-postgres
    plan: free
    region: singapore
    databaseName: marble_park
    user: marble_park_user
